<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="sg1" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop stop-color="#001428"/>
      <stop offset="0.6" stop-color="#014898"/>
      <stop offset="1" stop-color="#0050a8"/>
    </linearGradient>
    <linearGradient id="sg2" x1="10" y1="48" x2="90" y2="56" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F9B214"/>
      <stop offset="1" stop-color="#ffcc44"/>
    </linearGradient>
    <linearGradient id="sg3" x1="50" y1="0" x2="50" y2="100" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.04"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="24" fill="url(#sg1)"/>
  <!-- Shield -->
  <path d="M50 10L82 22V50C82 68 67 80 50 83C33 80 18 68 18 50V22L50 10Z" fill="url(#sg3)" stroke="white" stroke-opacity="0.18" stroke-width="1.5"/>
  <!-- Barbell bar -->
  <line x1="6" y1="48" x2="94" y2="48" stroke="url(#sg2)" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Left disc large -->
  <rect x="4" y="35" width="17" height="26" rx="4" fill="#014898" stroke="url(#sg2)" stroke-width="2.2"/>
  <rect x="4" y="38" width="17" height="20" rx="3" fill="#F9B214" opacity="0.25"/>
  <!-- Left disc small -->
  <rect x="1" y="39" width="5" height="18" rx="2" fill="#F9B214" opacity="0.75"/>
  <!-- Right disc large -->
  <rect x="79" y="35" width="17" height="26" rx="4" fill="#014898" stroke="url(#sg2)" stroke-width="2.2"/>
  <rect x="79" y="38" width="17" height="20" rx="3" fill="#F9B214" opacity="0.25"/>
  <!-- Right disc small -->
  <rect x="94" y="39" width="5" height="18" rx="2" fill="#F9B214" opacity="0.75"/>
  <!-- UBB text above barbell -->
  <text x="50" y="33" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="12" fill="white" opacity="0.85" letter-spacing="3.5">UBB</text>
  <!-- Separator line -->
  <line x1="28" y1="38" x2="72" y2="38" stroke="white" stroke-opacity="0.12" stroke-width="1"/>
  <!-- GYM text below barbell -->
  <text x="50" y="64" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="10" fill="white" opacity="0.7" letter-spacing="2.5">GYM</text>
  <!-- Wave 1 -->
  <path d="M20 75C29 71 35 79 44 75C53 71 59 79 68 75C77 71 82 77 80 77" stroke="#F9B214" stroke-width="1.8" fill="none" opacity="0.65" stroke-linecap="round"/>
  <!-- Wave 2 -->
  <path d="M20 82C29 78 35 86 44 82C53 78 59 86 68 82C77 78 82 84 80 84" stroke="#F9B214" stroke-width="1.2" fill="none" opacity="0.3" stroke-linecap="round"/>
</svg>
