name: gym_ubb
description: "App móvil institucional para el gimnasio UBB"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # Navegación
  go_router: ^14.8.1

  # HTTP y almacenamiento seguro
  http: ^1.4.0
  flutter_secure_storage: ^9.2.4

  # Estado global
  provider: ^6.1.5

  # Íconos
  cupertino_icons: ^1.0.8

  # URL launcher (video tutorials)
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/body-map/
