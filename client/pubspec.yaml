name: gym_ubb
description: "App móvil institucional para el gimnasio UBB"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # Navegación
  go_router: ^14.8.1

  # HTTP y almacenamiento seguro
  http: ^1.4.0
  flutter_secure_storage: ^9.2.4

  # Estado global
  provider: ^6.1.5

  # Íconos
  cupertino_icons: ^1.0.8

  # URL launcher (video tutorials)
  url_launcher: ^6.3.1

  # WebView para reproducir YouTube embed
  webview_flutter: ^4.10.0

  # SVG rendering (mapa corporal)
  flutter_svg: ^2.0.10+1

  # Galería / cámara para subir imágenes de ejercicios
  image_picker: ^1.1.2

  # Gráficos (historial de progreso)
  fl_chart: ^0.70.2

  # Onboarding y preferencias
  shared_preferences: ^2.3.3
  permission_handler: ^11.3.1

  # Sonidos (countdown timer de descanso)
  audioplayers: ^6.1.0

  # Exportar historial en PDF
  pdf: ^3.12.0
  printing: ^5.14.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/body-map/
    - assets/sounds/
